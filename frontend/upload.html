<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Music — ListenMe</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .upload-wrap { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:start; }
    @media(max-width:768px){ .upload-wrap{grid-template-columns:1fr;} }

    .access-denied { text-align:center; padding:100px 20px; }
    .access-denied .ad-icon { font-size:64px; margin-bottom:20px; }
    .access-denied h2 { font-size:26px; margin-bottom:8px; }
    .access-denied p { color:var(--text-2); margin-bottom:24px; }

    .drop-zone {
      border:2px dashed var(--border); border-radius:var(--radius);
      padding:50px 28px; text-align:center; cursor:pointer;
      transition:all .25s; background:var(--card); position:relative; overflow:hidden;
    }
    .drop-zone:hover,.drop-zone.dragover { border-color:var(--green); background:rgba(29,185,84,.06); }
    .drop-zone input[type=file] {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; z-index:5;
    }
    .dz-icon { font-size:40px; margin-bottom:14px; pointer-events:none; }
    .dz-main { font-size:15px; font-weight:700; margin-bottom:4px; pointer-events:none; }
    .dz-sub  { font-size:13px; color:var(--text-2); pointer-events:none; }

    .file-preview {
      display:none; margin-top:12px; padding:12px 14px;
      background:var(--elevated); border-radius:var(--radius-sm); text-align:left;
    }
    .fp-name { font-weight:600; font-size:13px; word-break:break-all; }
    .fp-size { font-size:12px; color:var(--text-2); margin-top:2px; }

    .prog-wrap { display:none; margin-top:12px; height:4px; background:var(--border); border-radius:50px; overflow:hidden; }
    .prog-fill { height:100%; background:var(--green); border-radius:50px; width:0%; transition:width .3s; }
    .prog-label { display:none; font-size:12px; color:var(--text-2); margin-top:6px; }

    .meta-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }

    /* ═══ COVER ZONE — label wraps the whole box so clicking anywhere triggers file input ═══ */
    .cover-label {
      display:block; cursor:pointer;
      border:2px dashed var(--border); border-radius:var(--radius-sm);
      height:200px; position:relative; overflow:hidden;
      background:var(--surface); transition:border-color .2s; margin-bottom:8px;
    }
    .cover-label:hover { border-color:var(--green); }

    /* Real file input is HIDDEN — label click triggers it automatically */
    #coverFile { display:none; }

    .cover-preview {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; display:none;
    }
    .cover-placeholder {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    }
    .cover-placeholder-icon { font-size:36px; }
    .cover-placeholder-text { font-size:13px; color:var(--text-2); }
    .cover-change-ov {
      position:absolute; inset:0; background:rgba(0,0,0,.55);
      display:none; align-items:center; justify-content:center;
      font-size:13px; color:#fff; gap:6px;
    }
    .has-cover .cover-change-ov { display:none; }
    .cover-label:hover .cover-change-ov { display:flex !important; }

    /* Catalog */
    .catalog { margin-top:48px; }
    .cat-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .cat-title { font-size:20px; font-weight:800; }
    .song-table { width:100%; border-collapse:collapse; }
    .song-table th {
      text-align:left; font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; color:var(--text-2); padding:0 12px 12px;
      border-bottom:1px solid var(--border);
    }
    .song-table td { padding:10px 12px; vertical-align:middle; }
    .song-table tr:hover td { background:var(--card-hover); }
    .st-info { display:flex; align-items:center; gap:12px; }
    .st-thumb {
      width:44px; height:44px; border-radius:6px; flex-shrink:0;
      background:var(--elevated); display:flex; align-items:center;
      justify-content:center; font-size:20px; overflow:hidden;
    }
    .st-thumb img { width:100%; height:100%; object-fit:cover; }
    .st-title  { font-weight:700; font-size:14px; }
    .st-artist { font-size:12px; color:var(--text-2); }
    .genre-badge {
      display:inline-block; padding:3px 9px; border-radius:500px;
      background:var(--elevated); font-size:11px; color:var(--text-2); font-weight:600;
    }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-2); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="play.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
        <circle cx="12" cy="12" r="12" fill="#1db954"/>
        <path d="M6.5 8.8c3.2-1 6.8-.8 9.5.9" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M7 11.8c2.8-.8 5.6-.6 7.8.7" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M7.5 14.6c2.1-.6 4.2-.4 5.8.5" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    Listen<span>Me</span>
  </a>
  <div class="nav-links">
    <a href="play.html">Discover</a>
    <a href="upload.html" class="active">Upload</a>
  </div>
  <button class="btn-logout" onclick="doLogout()">Log out</button>
</nav>

<div class="page-container" id="accessDenied" style="display:none;">
  <div class="access-denied">
    <div class="ad-icon">🔒</div>
    <h2>Admin Only</h2>
    <p>Only admins can upload music.</p>
    <a href="play.html" class="btn btn-primary" style="max-width:200px;">Go to Library</a>
  </div>
</div>

<div class="page-container" id="pageBody" style="display:none;">
  <a href="play.html" class="back-link">← Back to Library</a>
  <div class="page-title">Upload <span>Music</span></div>
  <p class="page-desc">Add songs to the ListenMe library.</p>

  <div class="upload-wrap">
    <!-- Audio drop zone -->
    <div>
      <div class="drop-zone" id="audioZone">
        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,.flac,.m4a,.aac" onchange="audioSelected(this)" />
        <div class="dz-icon">🎵</div>
        <div class="dz-main">Drop audio file here</div>
        <div class="dz-sub">MP3 · WAV · OGG · FLAC · M4A · AAC</div>
      </div>
      <div class="file-preview" id="filePreview">
        <div class="fp-name" id="fileName"></div>
        <div class="fp-size" id="fileSize"></div>
      </div>
      <div class="prog-wrap" id="progWrap"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel"></div>
      <div id="upErr" class="alert alert-error"   style="margin-top:12px;"></div>
      <div id="upSuc" class="alert alert-success" style="margin-top:12px;"></div>
      <button class="btn btn-primary" id="upBtn" onclick="doUpload()" style="margin-top:16px;" disabled>
        <span id="upBtnText">Upload Song</span>
        <span class="spinner" id="upSpinner"></span>
      </button>
    </div>

    <!-- Metadata -->
    <div class="meta-card">
      <div style="margin-bottom:20px;">
        <label>Cover Art / Thumbnail</label>

        <!-- FIXED: label wraps entire box. Clicking anywhere opens file dialog. -->
        <label class="cover-label" id="coverLabel">
          <!-- Input hidden, triggered by parent label -->
          <input type="file" id="coverFile" accept="image/jpeg,image/png,image/webp,image/gif" onchange="coverSelected(this)" />

          <!-- Preview fills box after selection -->
          <img class="cover-preview" id="coverPreview" alt="Cover preview" />

          <!-- Placeholder before selection -->
          <div class="cover-placeholder" id="coverPlaceholder">
            <span class="cover-placeholder-icon">🖼️</span>
            <span class="cover-placeholder-text">Click to upload cover art</span>
            <span style="font-size:11px;color:var(--muted);">JPG · PNG · WEBP</span>
          </div>

          <!-- Hover overlay after selection -->
          <div class="cover-change-ov" id="coverChangeOv">✏️ Change cover</div>
        </label>
        <div id="coverName" style="font-size:11px;color:var(--text-2);margin-top:4px;"></div>
      </div>

      <div class="form-group">
        <label>Song Title *</label>
        <input type="text" id="title" placeholder="e.g. Blinding Lights" oninput="checkReady()" />
      </div>
      <div class="form-group">
        <label>Artist *</label>
        <input type="text" id="artist" placeholder="e.g. The Weeknd" oninput="checkReady()" />
      </div>
      <div class="form-group">
        <label>Album</label>
        <input type="text" id="album" placeholder="Optional" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select id="genre">
          <option value="">— Select genre —</option>
          <option>Pop</option><option>Hip-Hop</option><option>R&amp;B</option>
          <option>Rock</option><option>Electronic</option><option>Jazz</option>
          <option>Classical</option><option>Indie</option><option>Other</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Catalog -->
  <div class="catalog">
    <div class="cat-hdr">
      <div class="cat-title">All Songs</div>
      <span id="songCount" style="font-size:13px;color:var(--text-2);"></span>
    </div>
    <div id="catalogBody"><div class="empty-state">Loading…</div></div>
  </div>
</div>

<script>
const API   = window.API_BASE || '/api';
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');

if (!token) location.href = 'login.html';
else if (!user.is_admin) document.getElementById('accessDenied').style.display = 'block';
else { document.getElementById('pageBody').style.display = 'block'; loadCatalog(); }

function apiCall(method, path, body, isForm) {
  return fetch(API + path, {
    method,
    headers: isForm ? { Authorization:`Bearer ${token}` }
                    : { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
    body: isForm ? body : (body ? JSON.stringify(body) : undefined)
  }).then(async r => { const j=await r.json(); if(!r.ok) throw new Error(j.error||'Failed'); return j; });
}

function doLogout() { localStorage.clear(); location.href='login.html'; }

function showAlert(id, msg, show=true) {
  const el=document.getElementById(id); el.textContent=msg; el.style.display=show?'block':'none';
}

function fmtBytes(b) {
  if(!b) return '—';
  return b<1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function checkReady() {
  const a=!!document.getElementById('audioFile').files[0];
  const t=!!document.getElementById('title').value.trim();
  const r=!!document.getElementById('artist').value.trim();
  document.getElementById('upBtn').disabled=!(a&&t&&r);
}

function audioSelected(input) {
  const f=input.files[0]; if(!f) return;
  document.getElementById('fileName').textContent=f.name;
  document.getElementById('fileSize').textContent=fmtBytes(f.size);
  document.getElementById('filePreview').style.display='block';
  const t=document.getElementById('title');
  if(!t.value) t.value=f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  checkReady();
}

function coverSelected(input) {
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    const img=document.getElementById('coverPreview');
    img.src=e.target.result;
    img.style.display='block';
    document.getElementById('coverPlaceholder').style.display='none';
    document.getElementById('coverLabel').classList.add('has-cover');
    document.getElementById('coverName').textContent='✓ '+f.name;
  };
  r.readAsDataURL(f);
}

// Drag & drop on audio zone
const zone=document.getElementById('audioZone');
zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop', e=>{
  e.preventDefault(); zone.classList.remove('dragover');
  const f=e.dataTransfer.files[0]; if(!f) return;
  const dt=new DataTransfer(); dt.items.add(f);
  document.getElementById('audioFile').files=dt.files;
  audioSelected(document.getElementById('audioFile'));
});

async function doUpload() {
  showAlert('upErr','',false); showAlert('upSuc','',false);
  const audioFile=document.getElementById('audioFile').files[0];
  const coverFile=document.getElementById('coverFile').files[0];
  const title=document.getElementById('title').value.trim();
  const artist=document.getElementById('artist').value.trim();
  const album=document.getElementById('album').value.trim();
  const genre=document.getElementById('genre').value;

  if(!audioFile) return showAlert('upErr','Please select an audio file.');
  if(!title)     return showAlert('upErr','Song title is required.');
  if(!artist)    return showAlert('upErr','Artist name is required.');

  const fd=new FormData();
  fd.append('audio',audioFile);
  fd.append('title',title);
  fd.append('artist',artist);
  if(album) fd.append('album',album);
  if(genre) fd.append('genre',genre);
  if(coverFile) fd.append('cover',coverFile);  // thumbnail sent to backend

  document.getElementById('progWrap').style.display='block';
  document.getElementById('progLabel').style.display='block';
  document.getElementById('upBtnText').style.display='none';
  document.getElementById('upSpinner').style.display='block';
  document.getElementById('upBtn').disabled=true;

  let pct=0;
  const timer=setInterval(()=>{
    pct=Math.min(pct+Math.random()*8,88);
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('progLabel').textContent=`Uploading… ${Math.round(pct)}%`;
  },200);

  try {
    await apiCall('POST','/songs/upload',fd,true);
    clearInterval(timer);
    document.getElementById('progFill').style.width='100%';
    document.getElementById('progLabel').textContent='Upload complete!';
    showAlert('upSuc',`✅ "${title}" uploaded successfully!`);
    setTimeout(()=>{
      ['audioFile','coverFile','title','artist','album'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
      document.getElementById('genre').value='';
      document.getElementById('filePreview').style.display='none';
      document.getElementById('progWrap').style.display='none';
      document.getElementById('progLabel').style.display='none';
      document.getElementById('coverPreview').style.display='none';
      document.getElementById('coverPreview').src='';
      document.getElementById('coverPlaceholder').style.display='flex';
      document.getElementById('coverLabel').classList.remove('has-cover');
      document.getElementById('coverName').textContent='';
      document.getElementById('upBtnText').style.display='inline';
      document.getElementById('upSpinner').style.display='none';
      document.getElementById('upBtn').disabled=true;
      loadCatalog();
    },1500);
  } catch(err) {
    clearInterval(timer);
    showAlert('upErr',err.message);
    document.getElementById('upBtnText').style.display='inline';
    document.getElementById('upSpinner').style.display='none';
    document.getElementById('upBtn').disabled=false;
  }
}

async function loadCatalog() {
  try {
    const {songs}=await apiCall('GET','/songs/my');
    document.getElementById('songCount').textContent=`${songs.length} songs`;
    if(!songs.length){
      document.getElementById('catalogBody').innerHTML='<div class="empty-state">No songs yet.</div>';
      return;
    }
    document.getElementById('catalogBody').innerHTML=`
      <table class="song-table">
        <thead><tr><th>#</th><th>Song</th><th>Genre</th><th>Size</th><th>Plays</th><th></th></tr></thead>
        <tbody>${songs.map((s,i)=>`
          <tr>
            <td style="color:var(--text-2);font-size:12px;">${i+1}</td>
            <td>
              <div class="st-info">
                <div class="st-thumb">${s.cover_url?`<img src="${esc(s.cover_url)}" loading="lazy"/>`:'🎵'}</div>
                <div><div class="st-title">${esc(s.title)}</div><div class="st-artist">${esc(s.artist)}</div></div>
              </div>
            </td>
            <td>${s.genre?`<span class="genre-badge">${esc(s.genre)}</span>`:'—'}</td>
            <td style="color:var(--text-2);font-size:12px;">${fmtBytes(s.file_size)}</td>
            <td style="color:var(--text-2);font-size:12px;">${s.play_count||0}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteSong(${s.id},'${esc(s.title)}')">Delete</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('catalogBody').innerHTML=`<div class="empty-state">Failed: ${e.message}</div>`;
  }
}

async function deleteSong(id,title) {
  if(!confirm(`Delete "${title}"?`)) return;
  try { await apiCall('DELETE',`/songs/${id}`); loadCatalog(); }
  catch(e) { alert('Delete failed: '+e.message); }
}
</script>
</body>
</html>
