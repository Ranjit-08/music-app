<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ListenMe — Discover</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body { overflow-x:hidden; }

    /* ══ LAYOUT ══════════════════════════════════════ */
    .app-layout {
      display:flex;
      min-height:calc(100vh - 60px);
      padding-bottom:94px;
    }

    /* ══ SIDEBAR ══════════════════════════════════════ */
    .sidebar {
      width:230px; flex-shrink:0;
      border-right:1px solid var(--border);
      padding:20px 0;
      position:sticky; top:60px;
      height:calc(100vh - 60px);
      overflow-y:auto;
      background:rgba(9,9,9,0.8);
    }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    .sb-label {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.12em; color:var(--muted);
      padding:0 18px; margin-bottom:4px; display:block;
    }
    .sb-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 18px; color:var(--text-2); font-size:13px;
      font-weight:500; cursor:pointer; width:100%; text-align:left;
      border:none; background:none; font-family:var(--font-body);
      transition:all 0.15s;
    }
    .sb-item:hover { color:var(--text); background:rgba(255,255,255,0.04); }
    .sb-item.active { color:var(--accent); background:rgba(225,29,72,0.09); }
    .sb-item .ic { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
    .sb-item .ct {
      margin-left:auto; font-size:11px; padding:1px 7px;
      background:var(--border); border-radius:50px; color:var(--muted);
    }
    .sb-divider { height:1px; background:var(--border); margin:10px 18px; }

    .sb-artist {
      display:flex; align-items:center; gap:9px;
      padding:7px 18px; cursor:pointer; transition:background 0.15s;
    }
    .sb-artist:hover { background:rgba(255,255,255,0.04); }
    .sb-artist.active { background:rgba(225,29,72,0.09); }
    .sb-av {
      width:28px; height:28px; border-radius:50%;
      background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800; color:#fff;
      flex-shrink:0; overflow:hidden; font-family:var(--font-display);
    }
    .sb-av img { width:100%; height:100%; object-fit:cover; }
    .sb-aname { font-size:12px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ══ MAIN ══════════════════════════════════════ */
    .main { flex:1; min-width:0; padding:24px 28px; }

    /* ══ TOP BAR ══════════════════════════════════════ */
    .top-bar { display:flex; gap:12px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
    .search-wrap { flex:1; min-width:180px; position:relative; }
    .search-wrap .si {
      position:absolute; left:14px; top:50%;
      transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:14px;
    }
    .search-wrap input { padding-left:40px; border-radius:50px; background:var(--card); font-size:14px; }

    .view-toggle {
      display:flex; gap:3px; background:var(--card);
      border:1px solid var(--border); border-radius:8px; padding:3px;
    }
    .vb {
      padding:5px 9px; border-radius:5px; border:none;
      background:none; color:var(--muted); cursor:pointer; font-size:15px;
      transition:all 0.15s;
    }
    .vb.active { background:var(--primary); color:#fff; }

    /* ══ GENRE CHIPS ══════════════════════════════════════ */
    .chips { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:20px; }
    .chip {
      padding:5px 14px; border-radius:50px;
      border:1px solid var(--border); background:var(--card);
      color:var(--muted); font-size:13px; cursor:pointer;
      transition:all 0.15s; font-family:var(--font-body);
    }
    .chip:hover, .chip.active {
      border-color:var(--primary); color:var(--accent);
      background:rgba(225,29,72,0.08);
    }

    /* ══ SECTION HEADER ══════════════════════════════════════ */
    .sec-hdr { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
    .sec-hdr h2 { font-family:var(--font-display); font-size:20px; font-weight:800; }
    .sec-badge {
      background:var(--card); border:1px solid var(--border);
      border-radius:50px; padding:2px 10px; font-size:11px; color:var(--muted);
    }

    /* ══ GRID ══════════════════════════════════════ */
    .songs-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:16px;
    }

    .song-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
      cursor:pointer; transition:all 0.25s; position:relative;
      animation:cardIn 0.35s ease both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .song-card:hover {
      border-color:rgba(225,29,72,0.4);
      transform:translateY(-4px);
      box-shadow:0 12px 40px rgba(225,29,72,0.14);
      background:var(--card-hover);
    }
    .song-card.playing {
      border-color:var(--primary);
      box-shadow:0 0 0 1px var(--primary), 0 12px 40px rgba(225,29,72,0.2);
    }

    .card-cover {
      width:100%; aspect-ratio:1;
      background:linear-gradient(135deg,#1a0a0f,#0f0a0a);
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    .card-cover-img {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; transition:transform 0.35s;
    }
    .song-card:hover .card-cover-img { transform:scale(1.06); }
    .cover-emoji { font-size:48px; z-index:1; }

    .play-ov {
      position:absolute; inset:0;
      background:rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity 0.2s; z-index:2;
    }
    .song-card:hover .play-ov,
    .song-card.playing .play-ov { opacity:1; }
    .song-card.playing .play-ov { background:rgba(225,29,72,0.25); }

    .play-circle {
      width:46px; height:46px; background:var(--primary);
      border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:17px; color:#fff;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      transition:transform 0.2s;
    }
    .song-card:hover .play-circle { transform:scale(1.1); }

    /* Playing bars */
    .bars { display:flex; gap:3px; height:18px; align-items:flex-end; }
    .bar  { width:3px; background:#fff; border-radius:2px; animation:barB 0.9s ease infinite; }
    .bar:nth-child(2){animation-delay:.15s}
    .bar:nth-child(3){animation-delay:.30s}
    .bar:nth-child(4){animation-delay:.45s}
    @keyframes barB{0%,100%{height:3px}50%{height:18px}}

    /* Fav btn on card */
    .fav-btn {
      position:absolute; top:7px; right:7px;
      background:rgba(0,0,0,0.55); border:none; border-radius:50%;
      width:30px; height:30px; display:flex; align-items:center;
      justify-content:center; cursor:pointer; font-size:14px;
      z-index:3; opacity:0; transition:all 0.2s;
      backdrop-filter:blur(6px);
    }
    .song-card:hover .fav-btn,
    .fav-btn.on { opacity:1; }
    .fav-btn.on { background:rgba(225,29,72,0.35); }
    .fav-btn:hover { transform:scale(1.15); }

    .card-body { padding:12px 13px 14px; }
    .card-title { font-weight:700; font-size:13px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-meta  { color:var(--text-2); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-genre {
      display:inline-block; margin-top:8px;
      padding:2px 9px; border-radius:50px;
      background:rgba(225,29,72,0.10); color:var(--accent);
      font-size:11px; font-weight:600;
    }

    /* ══ LIST VIEW ══════════════════════════════════════ */
    .songs-list { display:none; flex-direction:column; gap:5px; }
    .songs-list.on { display:flex; }
    .songs-grid.off { display:none; }

    .song-row {
      display:flex; align-items:center; gap:12px;
      padding:11px 14px; background:var(--card);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      cursor:pointer; transition:all 0.18s; position:relative;
      animation:cardIn 0.28s ease both;
    }
    .song-row:hover { border-color:rgba(225,29,72,0.35); background:var(--card-hover); }
    .song-row.playing { border-color:var(--primary); box-shadow:0 0 0 1px var(--primary); }
    .row-num { width:22px; text-align:center; color:var(--muted); font-size:12px; flex-shrink:0; }
    .row-thumb {
      width:42px; height:42px; border-radius:7px;
      background:var(--surface); flex-shrink:0; overflow:hidden;
      display:flex; align-items:center; justify-content:center; font-size:17px;
    }
    .row-thumb img { width:100%; height:100%; object-fit:cover; }
    .row-info { flex:1; min-width:0; }
    .row-title { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-meta  { font-size:12px; color:var(--text-2); }
    .row-genre {
      padding:2px 9px; border-radius:50px;
      background:rgba(225,29,72,0.09); color:var(--accent);
      font-size:11px; font-weight:600; white-space:nowrap;
    }
    .row-fav {
      background:none; border:none; cursor:pointer;
      font-size:16px; color:var(--muted); padding:4px; transition:all 0.2s;
    }
    .row-fav.on { color:var(--accent); }
    .row-fav:hover { transform:scale(1.2); }
    .row-dur { font-size:11px; color:var(--muted); min-width:34px; text-align:right; }

    /* ══ ARTIST GRID ══════════════════════════════════════ */
    .artists-grid {
      display:none;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:16px;
    }
    .artists-grid.on { display:grid; }

    .artist-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:22px 14px;
      text-align:center; cursor:pointer; transition:all 0.25s;
      animation:cardIn 0.35s ease both;
    }
    .artist-card:hover {
      border-color:rgba(225,29,72,0.4); transform:translateY(-4px);
      box-shadow:0 12px 40px rgba(225,29,72,0.12);
      background:var(--card-hover);
    }
    .artist-av {
      width:76px; height:76px; border-radius:50%;
      background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; font-weight:900; color:#fff;
      margin:0 auto 12px; overflow:hidden;
      font-family:var(--font-display);
      box-shadow:0 6px 20px var(--primary-glow);
      transition:transform 0.25s, box-shadow 0.25s;
    }
    .artist-card:hover .artist-av {
      transform:scale(1.06);
      box-shadow:0 10px 30px rgba(225,29,72,0.3);
    }
    .artist-av img { width:100%; height:100%; object-fit:cover; }
    .artist-name  { font-weight:700; font-size:14px; margin-bottom:4px; }
    .artist-count { font-size:12px; color:var(--text-2); }

    /* ══ EMPTY ══════════════════════════════════════ */
    .empty {
      text-align:center; padding:70px 20px;
      color:var(--muted); grid-column:1/-1;
    }
    .empty .ei { font-size:52px; margin-bottom:14px; opacity:0.5; }
    .empty h3 { font-family:var(--font-display); font-size:18px; margin-bottom:6px; color:var(--text-2); }

    /* ══ PLAYER BAR ══════════════════════════════════════ */
    .player-bar {
      position:fixed; bottom:0; left:0; right:0;
      height:88px;
      background:rgba(9,9,9,0.98);
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      border-top:1px solid var(--border);
      padding:0 24px;
      z-index:300;
      display:none; align-items:center; gap:18px;
    }
    .player-bar.on { display:flex; }

    /* Red glow line on top of player */
    .player-bar::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--primary),transparent);
      opacity:0.6;
    }

    .now-playing {
      display:flex; align-items:center; gap:12px;
      min-width:200px; flex-shrink:0;
    }
    .pl-thumb {
      width:52px; height:52px; border-radius:9px;
      background:var(--surface); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; overflow:hidden;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);
    }
    .pl-thumb img { width:100%; height:100%; object-fit:cover; border-radius:inherit; }
    .pl-text { min-width:0; }
    .pl-title  { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; }
    .pl-artist { color:var(--text-2); font-size:12px; }
    .pl-fav {
      background:none; border:none; cursor:pointer; font-size:18px;
      color:var(--muted); padding:4px; transition:all 0.2s; flex-shrink:0;
    }
    .pl-fav.on { color:var(--accent); }
    .pl-fav:hover { transform:scale(1.2); }

    /* Controls */
    .pl-controls {
      flex:1; display:flex; flex-direction:column;
      align-items:center; gap:7px; min-width:0;
    }
    .ctrl-row { display:flex; align-items:center; gap:14px; }
    .ctrl {
      background:none; border:none; color:var(--muted);
      cursor:pointer; font-size:18px; line-height:1;
      transition:all 0.18s; padding:4px; border-radius:50%;
    }
    .ctrl:hover { color:var(--text); transform:scale(1.1); }
    .ctrl.on { color:var(--accent); }
    .ctrl.play {
      width:44px; height:44px;
      background:var(--primary); color:#fff; font-size:17px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 18px var(--primary-glow);
    }
    .ctrl.play:hover {
      transform:scale(1.08);
      box-shadow:0 6px 24px rgba(225,29,72,0.4);
    }

    .prog-row {
      display:flex; align-items:center; gap:9px;
      width:100%; max-width:540px;
    }
    .tlbl {
      font-size:11px; color:var(--muted); min-width:34px;
      font-variant-numeric:tabular-nums;
    }
    .tlbl:last-child { text-align:right; }

    input[type=range].prog {
      -webkit-appearance:none; flex:1; height:3px;
      background:var(--border); border-radius:3px;
      cursor:pointer; outline:none; padding:0;
      transition:height 0.15s;
    }
    input[type=range].prog:hover { height:5px; }
    input[type=range].prog::-webkit-slider-thumb {
      -webkit-appearance:none; width:13px; height:13px;
      border-radius:50%; background:var(--primary);
      box-shadow:0 0 6px var(--primary-glow); cursor:pointer;
    }

    .vol-area {
      display:flex; align-items:center; gap:7px;
      min-width:120px; flex-shrink:0;
    }
    .vol-ic { font-size:16px; cursor:pointer; color:var(--muted); transition:color 0.2s; background:none; border:none; }
    .vol-ic:hover { color:var(--text); }
    input[type=range].vol {
      -webkit-appearance:none; width:80px; height:3px;
      background:var(--border); border-radius:3px;
      cursor:pointer; outline:none; padding:0;
    }
    input[type=range].vol::-webkit-slider-thumb {
      -webkit-appearance:none; width:11px; height:11px;
      border-radius:50%; background:var(--muted); cursor:pointer;
    }

    /* ══ PROFILE PANEL ══════════════════════════════════════ */
    /* Overlay: slides in from the right over play.html — music keeps playing */
    .profile-overlay {
      position:fixed; inset:0; z-index:400;
      pointer-events:none;
    }
    .profile-overlay.open { pointer-events:all; }

    .profile-backdrop {
      position:absolute; inset:0;
      background:rgba(0,0,0,0.7);
      opacity:0; transition:opacity 0.3s;
      cursor:pointer;
    }
    .profile-overlay.open .profile-backdrop { opacity:1; }

    .profile-panel {
      position:absolute; top:0; right:0; bottom:0;
      width:440px; max-width:100%;
      background:#0f0f0f;
      border-left:1px solid var(--border);
      transform:translateX(100%);
      transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
      overflow-y:auto;
      display:flex; flex-direction:column;
    }
    .profile-overlay.open .profile-panel { transform:translateX(0); }

    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px 16px;
      border-bottom:1px solid var(--border);
      position:sticky; top:0; background:#0f0f0f; z-index:1;
    }
    .panel-title { font-family:var(--font-display); font-size:18px; font-weight:800; }
    .panel-close {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:22px; padding:4px; transition:color 0.2s; line-height:1;
    }
    .panel-close:hover { color:var(--text); }

    .panel-body { padding:24px; flex:1; }

    /* Profile hero inside panel */
    .p-hero {
      display:flex; align-items:center; gap:18px;
      padding:22px; background:var(--card);
      border:1px solid var(--border); border-radius:var(--radius);
      margin-bottom:24px; position:relative; overflow:hidden;
    }
    .p-hero::before {
      content:''; position:absolute; top:-30px; right:-30px;
      width:140px; height:140px; border-radius:50%;
      background:radial-gradient(circle,rgba(225,29,72,0.12),transparent);
      pointer-events:none;
    }
    .p-avatar {
      width:70px; height:70px; border-radius:50%;
      background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:26px; font-weight:900;
      color:#fff; flex-shrink:0;
      box-shadow:0 6px 24px var(--primary-glow);
    }
    .p-name  { font-family:var(--font-display); font-size:22px; font-weight:800; margin-bottom:3px; }
    .p-email { color:var(--text-2); font-size:13px; margin-bottom:12px; }
    .p-stats { display:flex; gap:20px; }
    .p-stat  { text-align:center; }
    .p-stat-n { font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--accent); }
    .p-stat-l { color:var(--muted); font-size:11px; margin-top:1px; }

    /* Panel tabs */
    .panel-tabs { display:flex; gap:5px; margin-bottom:18px; }
    .ptab {
      padding:7px 16px; border-radius:50px;
      border:1px solid var(--border); background:var(--card);
      color:var(--muted); font-size:13px; font-weight:500;
      cursor:pointer; transition:all 0.18s; font-family:var(--font-body);
    }
    .ptab:hover { border-color:#333; color:var(--text); }
    .ptab.active { background:rgba(225,29,72,0.10); border-color:var(--primary); color:var(--accent); }

    /* Songs in panel */
    .p-song-row {
      display:flex; align-items:center; gap:11px;
      padding:10px 13px; background:var(--card);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      margin-bottom:7px; cursor:pointer; transition:all 0.18s;
    }
    .p-song-row:hover { border-color:rgba(225,29,72,0.35); background:var(--card-hover); }
    .p-song-thumb {
      width:40px; height:40px; border-radius:7px;
      background:var(--surface); flex-shrink:0; overflow:hidden;
      display:flex; align-items:center; justify-content:center; font-size:16px;
    }
    .p-song-thumb img { width:100%; height:100%; object-fit:cover; }
    .p-song-info { flex:1; min-width:0; }
    .p-song-title { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .p-song-meta  { font-size:12px; color:var(--text-2); }
    .p-remove {
      background:none; border:none; cursor:pointer; font-size:14px;
      color:var(--muted); padding:4px; transition:all 0.18s;
    }
    .p-remove:hover { color:var(--danger); transform:scale(1.1); }

    .p-empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .p-empty .pe-ic { font-size:40px; margin-bottom:10px; opacity:0.5; }

    /* Sign out in panel */
    .panel-footer {
      padding:20px 24px;
      border-top:1px solid var(--border);
      margin-top:auto;
    }

    /* ══ RESPONSIVE ══════════════════════════════════════ */
    @media (max-width:900px) {
      .sidebar { display:none; }
      .main { padding:18px 14px; }
      .player-bar { padding:0 14px; gap:10px; }
      .now-playing { min-width:0; }
      .pl-title { max-width:90px; }
      .vol-area { display:none; }
      .profile-panel { width:100%; }
    }
    @media (max-width:600px) {
      .songs-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .artists-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- ══ NAVBAR ══════════════════════════════════════ -->
<nav class="navbar">
  <a class="logo" href="play.html">
    <div class="logo-icon">🎧</div>
    Listen<span>Me</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="play.html" class="active">Discover</a>
    <button onclick="openProfile()" id="profileNavBtn">Profile</button>
  </div>
  <div style="display:flex;align-items:center;gap:9px;">
    <span id="adminBadge" class="admin-badge" style="display:none;">⚡ Admin</span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- ══ APP LAYOUT ══════════════════════════════════════ -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div style="margin-bottom:6px;">
      <span class="sb-label">Library</span>
      <button class="sb-item active" id="sideAll" onclick="showView('all')">
        <span class="ic">🎵</span>All Songs<span class="ct" id="allCt">0</span>
      </button>
      <button class="sb-item" id="sideFav" onclick="showView('favorites')">
        <span class="ic">❤️</span>Favorites<span class="ct" id="favCt">0</span>
      </button>
      <button class="sb-item" id="sideArt" onclick="showView('artists')">
        <span class="ic">🎤</span>Artists
      </button>
    </div>
    <div class="sb-divider"></div>
    <div>
      <span class="sb-label">Artists</span>
      <div id="sbArtists"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="top-bar" id="topBar">
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Search songs, artists…" oninput="renderView()" />
      </div>
      <div class="view-toggle">
        <button class="vb active" onclick="setMode('grid')" title="Grid">⊞</button>
        <button class="vb" onclick="setMode('list')" title="List">☰</button>
      </div>
    </div>

    <div class="chips" id="chips" style="display:none;"></div>

    <div class="sec-hdr">
      <h2 id="secTitle">All Songs</h2>
      <span class="sec-badge" id="secBadge"></span>
    </div>

    <div class="songs-grid" id="songsGrid"></div>
    <div class="songs-list" id="songsList"></div>
    <div class="artists-grid" id="artistsGrid"></div>
  </main>
</div>

<!-- ══ PLAYER BAR ══════════════════════════════════════ -->
<div class="player-bar" id="playerBar">
  <audio id="audioEl"></audio>

  <div class="now-playing">
    <div class="pl-thumb" id="plThumb">🎵</div>
    <div class="pl-text">
      <div class="pl-title"  id="plTitle">—</div>
      <div class="pl-artist" id="plArtist">—</div>
    </div>
    <button class="pl-fav" id="plFav" onclick="toggleFavCurrent()">♡</button>
  </div>

  <div class="pl-controls">
    <div class="ctrl-row">
      <button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">⇄</button>
      <button class="ctrl" onclick="prevSong()" title="Prev">⏮</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="nextSong()" title="Next">⏭</button>
      <button class="ctrl" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">↺</button>
    </div>
    <div class="prog-row">
      <span class="tlbl" id="curTime">0:00</span>
      <input type="range" class="prog" id="progSlider" min="0" max="100" value="0" oninput="seek(this.value)" />
      <span class="tlbl" id="totTime">0:00</span>
    </div>
  </div>

  <div class="vol-area">
    <button class="vol-ic" onclick="toggleMute()">🔊</button>
    <input type="range" class="vol" id="volSlider" min="0" max="100" value="75" oninput="setVol(this.value)" />
  </div>
</div>

<!-- ══ PROFILE PANEL (slides over — music keeps playing) ══ -->
<div class="profile-overlay" id="profileOverlay">
  <div class="profile-backdrop" onclick="closeProfile()"></div>
  <div class="profile-panel">
    <div class="panel-header">
      <div class="panel-title">Profile</div>
      <button class="panel-close" onclick="closeProfile()">✕</button>
    </div>
    <div class="panel-body">
      <div id="profileContent"><div style="color:var(--muted);padding:20px 0;">Loading…</div></div>
    </div>
    <div class="panel-footer">
      <button class="btn btn-danger" style="width:100%;justify-content:center;border-radius:8px;padding:11px;" onclick="logout()">Sign Out</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
requireAuth();

// ── State ──────────────────────────────────────────────────────
let allSongs    = [];
let artists     = [];
let favorites   = new Set();
let favSongs    = [];
let queue       = [];
let currentIdx  = -1;
let isPlaying   = false;
let isShuffle   = false;
let isRepeat    = false;
let currentView = 'all';
let activeGenre = '';
let gridMode    = 'grid';
let currentId   = null;
const audio     = document.getElementById('audioEl');

// ── Init ───────────────────────────────────────────────────────
async function init() {
  const user = getUser();
  if (user?.is_admin) {
    document.getElementById('adminBadge').style.display = 'inline-flex';
    const nl = document.getElementById('navLinks');
    const ul = document.createElement('a');
    ul.href = 'upload.html'; ul.textContent = 'Upload';
    nl.insertBefore(ul, nl.children[1]);
  }
  await Promise.all([loadSongs(), loadArtists()]);

  // If arrived from profile.html, open panel automatically
  if (location.hash === '#profile') openProfile();
}

async function loadSongs() {
  try {
    const d = await api.get('/songs');
    allSongs  = d.songs;
    favorites = new Set(allSongs.filter(s=>s.is_favorite).map(s=>s.id));
    favSongs  = allSongs.filter(s=>s.is_favorite);
    buildGenres();
    document.getElementById('allCt').textContent = allSongs.length;
    document.getElementById('favCt').textContent = favorites.size;
    renderView();
  } catch(e) {
    document.getElementById('songsGrid').innerHTML =
      '<div class="empty" style="grid-column:1/-1"><div class="ei">⚠️</div><h3>Failed to load</h3></div>';
  }
}

async function loadArtists() {
  try {
    const d = await api.get('/artists');
    artists = d.artists;
    renderSbArtists();
  } catch(e) {}
}

// ── Genres ──────────────────────────────────────────────────────
function buildGenres() {
  const genres = [...new Set(allSongs.map(s=>s.genre).filter(Boolean))];
  const c = document.getElementById('chips');
  c.innerHTML = `<div class="chip active" onclick="setGenre(this,'')">All</div>`;
  genres.forEach(g => {
    const el = document.createElement('div');
    el.className = 'chip'; el.textContent = g;
    el.onclick = () => setGenre(el, g);
    c.appendChild(el);
  });
}
function setGenre(el, g) {
  activeGenre = g;
  document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderView();
}

// ── Sidebar artists ──────────────────────────────────────────────
function renderSbArtists() {
  document.getElementById('sbArtists').innerHTML = artists.map(a=>`
    <div class="sb-artist" onclick="showArtist('${escJs(a.artist)}')">
      <div class="sb-av">
        ${a.cover_url?`<img src="${esc(a.cover_url)}" />`:''}
        ${!a.cover_url?inits(a.artist):''}
      </div>
      <div class="sb-aname">${esc(a.artist)}</div>
    </div>
  `).join('');
}

// ── Views ────────────────────────────────────────────────────────
function showView(v) {
  currentView = v; activeGenre = '';
  document.getElementById('searchInput').value = '';
  ['sideAll','sideFav','sideArt'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.querySelectorAll('.sb-artist').forEach(el=>el.classList.remove('active'));
  document.getElementById({all:'sideAll',favorites:'sideFav',artists:'sideArt'}[v]||'sideAll').classList.add('active');
  renderView();
}
function showArtist(name) {
  currentView = 'artist:'+name;
  document.querySelectorAll('.sb-artist,.sb-item').forEach(el=>el.classList.remove('active'));
  renderView();
}

function renderView() {
  const grid  = document.getElementById('songsGrid');
  const list  = document.getElementById('songsList');
  const artG  = document.getElementById('artistsGrid');
  const chips = document.getElementById('chips');
  const title = document.getElementById('secTitle');
  const badge = document.getElementById('secBadge');

  grid.classList.remove('off'); list.classList.remove('on');
  artG.classList.remove('on');
  chips.style.display = 'none';

  if (currentView === 'artists') {
    title.textContent = 'Artists';
    badge.textContent = artists.length + ' artists';
    grid.classList.add('off');
    artG.classList.add('on');
    renderArtists(); return;
  }

  let songs;
  const q = document.getElementById('searchInput').value.toLowerCase();

  if (currentView === 'favorites') {
    songs = allSongs.filter(s=>favorites.has(s.id));
    title.textContent = '❤️ Favorites';
    chips.style.display = 'flex';
  } else if (currentView.startsWith('artist:')) {
    const name = currentView.slice(7);
    songs = allSongs.filter(s=>s.artist===name);
    title.innerHTML = `<span style="color:var(--text-2);font-weight:400;font-size:14px;">Artist ·</span> ${esc(name)}`;
  } else {
    songs = [...allSongs];
    title.textContent = 'All Songs';
    chips.style.display = 'flex';
  }

  if (activeGenre) songs = songs.filter(s=>s.genre===activeGenre);
  if (q) songs = songs.filter(s=>
    (s.title||'').toLowerCase().includes(q)||
    (s.artist||'').toLowerCase().includes(q)||
    (s.album||'').toLowerCase().includes(q)
  );

  badge.textContent = songs.length + ' songs';
  queue = songs;

  if (gridMode==='grid') {
    grid.classList.remove('off'); list.classList.remove('on');
    renderGrid(songs);
  } else {
    grid.classList.add('off'); list.classList.add('on');
    renderList(songs);
  }
}

function renderArtists() {
  const g = document.getElementById('artistsGrid');
  if (!artists.length) { g.innerHTML=emptyHtml('🎤','No artists yet','Music appears here once uploaded'); return; }
  g.innerHTML = artists.map(a=>`
    <div class="artist-card" onclick="showArtist('${escJs(a.artist)}')">
      <div class="artist-av">
        ${a.cover_url?`<img src="${esc(a.cover_url)}" />`:''}
        ${!a.cover_url?inits(a.artist):''}
      </div>
      <div class="artist-name">${esc(a.artist)}</div>
      <div class="artist-count">${a.song_count} song${a.song_count!==1?'s':''}</div>
    </div>
  `).join('');
}

function renderGrid(songs) {
  const g = document.getElementById('songsGrid');
  if (!songs.length) { g.innerHTML=emptyHtml('🎵','No songs found','Try a different search or filter'); return; }
  g.innerHTML = songs.map((s,i)=>`
    <div class="song-card${currentId===s.id?' playing':''}" onclick="playSong(${i},queue)">
      <div class="card-cover">
        ${s.cover_url?`<img class="card-cover-img" src="${esc(s.cover_url)}" loading="lazy"/>`:''}
        <span class="cover-emoji"${s.cover_url?' style="display:none"':''}>🎵</span>
        <div class="play-ov">
          <div class="play-circle">
            ${currentId===s.id&&isPlaying
              ?'<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>'
              :'▶'}
          </div>
        </div>
        <button class="fav-btn${favorites.has(s.id)?' on':''}"
                onclick="event.stopPropagation();toggleFav(${s.id})">${favorites.has(s.id)?'❤️':'♡'}</button>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-meta">${esc(s.artist)}${s.album?' · '+esc(s.album):''}</div>
        ${s.genre?`<span class="card-genre">${esc(s.genre)}</span>`:''}
      </div>
    </div>
  `).join('');
}

function renderList(songs) {
  const l = document.getElementById('songsList');
  if (!songs.length) { l.innerHTML=emptyHtml('🎵','No songs found','Try a different search'); return; }
  l.innerHTML = songs.map((s,i)=>`
    <div class="song-row${currentId===s.id?' playing':''}" onclick="playSong(${i},queue)">
      <div class="row-num">${currentId===s.id&&isPlaying
        ?'<div class="bars" style="height:13px"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>'
        :(i+1)}</div>
      <div class="row-thumb">${s.cover_url?`<img src="${esc(s.cover_url)}" loading="lazy"/>`:'🎵'}</div>
      <div class="row-info">
        <div class="row-title">${esc(s.title)}</div>
        <div class="row-meta">${esc(s.artist)}${s.album?' · '+esc(s.album):''}</div>
      </div>
      ${s.genre?`<span class="row-genre">${esc(s.genre)}</span>`:''}
      <button class="row-fav${favorites.has(s.id)?' on':''}"
              onclick="event.stopPropagation();toggleFav(${s.id})">${favorites.has(s.id)?'❤️':'♡'}</button>
      <div class="row-dur">${fmtT(s.duration)}</div>
    </div>
  `).join('');
}

function emptyHtml(icon,h,p) {
  return `<div class="empty" style="grid-column:1/-1">
    <div class="ei">${icon}</div><h3>${h}</h3><p>${p}</p></div>`;
}

// ── Playback ─────────────────────────────────────────────────────
function playSong(idx, songList) {
  if (!songList?.length) return;
  currentIdx = idx; queue = songList;
  const s = songList[idx]; currentId = s.id;
  audio.src = s.audio_url;
  audio.volume = document.getElementById('volSlider').value/100;
  audio.play(); isPlaying = true;
  updateBar(s); renderView();
  api.post(`/songs/${s.id}/play`,{}).catch(()=>{});
}

function updateBar(s) {
  document.getElementById('playerBar').classList.add('on');
  document.getElementById('plTitle').textContent  = s.title;
  document.getElementById('plArtist').textContent = s.artist||'—';
  document.getElementById('playBtn').textContent  = '⏸';
  const th = document.getElementById('plThumb');
  th.innerHTML = s.cover_url?`<img src="${esc(s.cover_url)}" />`:'🎵';
  const fb = document.getElementById('plFav');
  fb.textContent = favorites.has(s.id)?'❤️':'♡';
  fb.classList.toggle('on', favorites.has(s.id));
}

function togglePlay() {
  if (!queue.length) return;
  if (isPlaying) { audio.pause(); isPlaying=false; document.getElementById('playBtn').textContent='▶'; }
  else { audio.play(); isPlaying=true; document.getElementById('playBtn').textContent='⏸'; }
  renderView();
}

function nextSong() {
  if (!queue.length) return;
  let n = isShuffle ? rndIdx() : (currentIdx+1)%queue.length;
  playSong(n, queue);
}

function prevSong() {
  if (!queue.length) return;
  if (audio.currentTime>3) { audio.currentTime=0; return; }
  playSong((currentIdx-1+queue.length)%queue.length, queue);
}

function rndIdx() {
  let n; do { n=Math.floor(Math.random()*queue.length); } while(n===currentIdx&&queue.length>1);
  return n;
}

function toggleShuffle() {
  isShuffle=!isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('on',isShuffle);
}
function toggleRepeat() {
  isRepeat=!isRepeat; audio.loop=isRepeat;
  document.getElementById('repeatBtn').classList.toggle('on',isRepeat);
}

function seek(v) { if(audio.duration) audio.currentTime=(v/100)*audio.duration; }
function setVol(v) { audio.volume=v/100; }
function toggleMute() {
  audio.muted=!audio.muted;
  document.querySelector('.vol-ic').textContent=audio.muted?'🔇':'🔊';
}
function fmtT(s) {
  if(!s||isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const p=(audio.currentTime/audio.duration)*100;
  document.getElementById('progSlider').value=p;
  document.getElementById('curTime').textContent=fmtT(audio.currentTime);
  document.getElementById('totTime').textContent=fmtT(audio.duration);
});
audio.addEventListener('ended',()=>{ if(!isRepeat) nextSong(); });
audio.addEventListener('play', ()=>{ isPlaying=true; document.getElementById('playBtn').textContent='⏸'; });
audio.addEventListener('pause',()=>{ isPlaying=false; document.getElementById('playBtn').textContent='▶'; renderView(); });

// ── Favorites ────────────────────────────────────────────────────
async function toggleFav(id) {
  const was = favorites.has(id);
  was ? favorites.delete(id) : favorites.add(id);
  document.getElementById('favCt').textContent = favorites.size;
  if (currentId===id) {
    const fb=document.getElementById('plFav');
    fb.textContent=favorites.has(id)?'❤️':'♡';
    fb.classList.toggle('on',favorites.has(id));
  }
  renderView();
  try {
    if(was) await api.del(`/songs/${id}/favorite`);
    else await api.post(`/songs/${id}/favorite`,{});
    const s=allSongs.find(s=>s.id===id);
    if(s) s.is_favorite=!was;
    favSongs=allSongs.filter(s=>favorites.has(s.id));
  } catch(e) {
    was?favorites.add(id):favorites.delete(id);
    renderView();
  }
}
function toggleFavCurrent() { if(currentId) toggleFav(currentId); }

function setMode(m) {
  gridMode=m;
  document.querySelectorAll('.vb').forEach((b,i)=>b.classList.toggle('active',(m==='grid'&&i===0)||(m==='list'&&i===1)));
  renderView();
}

// ── Profile Panel ──────────────────────────────────────────────
async function openProfile() {
  document.getElementById('profileOverlay').classList.add('open');
  document.getElementById('profileNavBtn').classList.add('active');
  document.body.style.overflow='hidden';
  await loadProfileData();
}

function closeProfile() {
  document.getElementById('profileOverlay').classList.remove('open');
  document.getElementById('profileNavBtn').classList.remove('active');
  document.body.style.overflow='';
  history.replaceState(null,'',location.pathname);
}

// Keyboard close
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeProfile(); });

let profileTab = 'favorites';

async function loadProfileData() {
  const c = document.getElementById('profileContent');
  c.innerHTML = '<div style="color:var(--muted);padding:20px 0;">Loading…</div>';
  try {
    const {user} = await api.get('/auth/me');
    const ini = user.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const favsData = await api.get('/songs/favorites');
    const fList = favsData.songs;

    c.innerHTML = `
      <div class="p-hero">
        <div class="p-avatar">${ini}</div>
        <div>
          <div class="p-name">${esc(user.name)}</div>
          <div class="p-email">${esc(user.email)}</div>
          ${user.is_admin?'<div class="admin-badge" style="margin-bottom:10px;">⚡ Admin</div>':''}
          <div class="p-stats">
            <div class="p-stat">
              <div class="p-stat-n">${fList.length}</div>
              <div class="p-stat-l">Favourites</div>
            </div>
            <div class="p-stat">
              <div class="p-stat-n">${fmtDate(user.created_at)}</div>
              <div class="p-stat-l">Member</div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-tabs">
        <button class="ptab active" onclick="switchPTab('favorites',this)">❤️ Favourites</button>
        <button class="ptab" onclick="switchPTab('recent',this)">🕐 Recent</button>
      </div>

      <div id="pTabContent"></div>
    `;

    renderPanelFavs(fList);
  } catch(e) {
    c.innerHTML = '<div style="color:var(--danger);padding:20px 0;">Failed to load profile.</div>';
  }
}

function switchPTab(tab, el) {
  profileTab = tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if (tab==='favorites') {
    api.get('/songs/favorites').then(d=>renderPanelFavs(d.songs)).catch(()=>{});
  } else {
    renderPanelRecent();
  }
}

function renderPanelFavs(songs) {
  const c = document.getElementById('pTabContent');
  if (!songs.length) {
    c.innerHTML=`<div class="p-empty"><div class="pe-ic">❤️</div><div>No favourites yet.<br/>Heart songs while listening!</div></div>`;
    return;
  }
  c.innerHTML = songs.map(s=>`
    <div class="p-song-row" onclick="playSongFromPanel(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="p-song-thumb">${s.cover_url?`<img src="${esc(s.cover_url)}" />`:'🎵'}</div>
      <div class="p-song-info">
        <div class="p-song-title">${esc(s.title)}</div>
        <div class="p-song-meta">${esc(s.artist)}</div>
      </div>
      <button class="p-remove" onclick="event.stopPropagation();removeFavPanel(${s.id})" title="Remove">✕</button>
    </div>
  `).join('');
}

function renderPanelRecent() {
  const c = document.getElementById('pTabContent');
  const recent = [...allSongs].slice(0,20);
  if (!recent.length) {
    c.innerHTML=`<div class="p-empty"><div class="pe-ic">🎵</div><div>No songs yet.</div></div>`;
    return;
  }
  c.innerHTML = recent.map(s=>`
    <div class="p-song-row" onclick="playSongFromPanel(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="p-song-thumb">${s.cover_url?`<img src="${esc(s.cover_url)}" />`:'🎵'}</div>
      <div class="p-song-info">
        <div class="p-song-title">${esc(s.title)}</div>
        <div class="p-song-meta">${esc(s.artist)}</div>
      </div>
    </div>
  `).join('');
}

function playSongFromPanel(song) {
  // Find index in allSongs queue and play, or play directly
  const idx = allSongs.findIndex(s=>s.id===song.id);
  if (idx>=0) { currentView='all'; queue=allSongs; playSong(idx,allSongs); }
}

async function removeFavPanel(id) {
  try {
    await api.del(`/songs/${id}/favorite`);
    favorites.delete(id);
    document.getElementById('favCt').textContent=favorites.size;
    allSongs.forEach(s=>{ if(s.id===id) s.is_favorite=false; });
    favSongs=allSongs.filter(s=>favorites.has(s.id));
    const d=await api.get('/songs/favorites');
    renderPanelFavs(d.songs);
    renderView();
  } catch(e){}
}

function fmtDate(iso) {
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short'});
}

// ── Helpers ──────────────────────────────────────────────────────
function inits(n) { return (n||'?').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

init();
</script>
</body>
</html>
